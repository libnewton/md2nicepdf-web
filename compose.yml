services:
  md2pdf:
    image: ghcr.io/libnewton/md2nicepdf-web:latest
    hostname: md2pdf
    container_name: md2pdf
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - AUTH_TOKEN=${AUTH_TOKEN}
      - CONVERTER_IMAGE=${CONVERTER_IMAGE}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/md2pdf:/tmp/md2pdf
